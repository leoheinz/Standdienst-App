<style>
  :root {
    --tsg-blue: #0079bd;
    --tsg-blue-dark: #005f96;
    --tsg-blue-light: #e6f4fb;
    --white: #ffffff;
    --black: #050505;
    --danger: #c62828;
    --success: #008f4c;
  }

  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 16px;
    background: var(--tsg-blue);
    color: var(--white);
  }

  h1, h2 {
    margin-top: 0;
  }

  h1 {
    color: var(--white);
    text-align: center;
    font-size: 34px;
    margin-bottom: 20px;
  }

  h2 {
    color: var(--black);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding-bottom: 90px;
  }

  .card {
    background: var(--white);
    color: var(--black);
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    border: 3px solid var(--black);
  }

  input {
    font-size: 18px;
    padding: 12px;
    margin: 6px 0;
    width: 100%;
    box-sizing: border-box;
    border: 2px solid var(--black);
    border-radius: 8px;
    background: var(--white);
    color: var(--black);
  }

  input::placeholder {
    color: #666;
  }

  button {
    font-size: 18px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: var(--white);
    font-weight: bold;
  }

  .add-button {
    width: 100%;
    background: var(--tsg-blue);
    color: var(--white);
    margin-top: 8px;
    border: 2px solid var(--black);
  }

  .add-button:active {
    background: var(--tsg-blue-dark);
    transform: scale(0.98);
  }

  .items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }

  .item-button {
    background: var(--tsg-blue);
    color: var(--white);
    min-height: 75px;
    font-weight: bold;
    border: 2px solid var(--black);
    box-shadow: 0 3px 0 var(--black);
  }

  .item-button:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--black);
    background: var(--tsg-blue-dark);
  }

  .item-button.negative {
    background: var(--black);
    color: var(--white);
  }

  .order-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 2px solid var(--tsg-blue-light);
    align-items: center;
  }

  .order-row span {
    color: #333;
  }

  .order-row button {
    font-size: 18px;
    padding: 8px 13px;
    background: var(--tsg-blue);
    color: var(--white);
    margin-left: 4px;
    border: 2px solid var(--black);
  }

  .order-row button:active {
    background: var(--tsg-blue-dark);
    transform: scale(0.95);
  }

  .total {
    font-size: 34px;
    font-weight: bold;
    text-align: right;
    margin-top: 16px;
    color: var(--tsg-blue);
  }

  .danger {
    background: var(--danger);
    color: var(--white);
    width: 100%;
    margin-top: 12px;
    border: 2px solid var(--black);
  }

  .secondary {
    background: var(--black);
    color: var(--white);
    width: 100%;
    margin-top: 8px;
  }

  .small {
    font-size: 14px;
    color: #333;
  }

  .admin-list {
    margin-top: 12px;
  }

  .admin-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 2px solid var(--tsg-blue-light);
    color: var(--black);
  }

  .delete-button {
    background: var(--danger);
    color: var(--white);
    font-size: 14px;
    padding: 8px 10px;
    white-space: nowrap;
    border: 2px solid var(--black);
  }

  .settings-button {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: var(--white);
    color: var(--black);
    font-size: 28px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.45);
    z-index: 1000;
    border: 3px solid var(--black);
  }

  .settings-button:active {
    transform: scale(0.95);
    background: var(--tsg-blue-light);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    z-index: 2000;
    padding: 16px;
    box-sizing: border-box;
    overflow-y: auto;
  }

  .modal-overlay.open {
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .modal {
    width: 100%;
    max-width: 700px;
    background: var(--white);
    color: var(--black);
    border-radius: 16px;
    padding: 18px;
    margin-top: 30px;
    border: 3px solid var(--black);
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .modal-header h2 {
    margin: 0;
    color: var(--black);
  }

  .close-button {
    background: var(--black);
    color: var(--white);
    font-size: 22px;
    padding: 8px 13px;
    border-radius: 8px;
  }

  .modal-section {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 3px solid var(--tsg-blue);
  }

  @media (max-width: 600px) {
    body {
      padding: 12px;
    }

    h1 {
      font-size: 28px;
    }

    .items {
      grid-template-columns: repeat(2, 1fr);
    }

    .total {
      font-size: 32px;
    }

    .modal {
      margin-top: 10px;
    }
  }
</style>
